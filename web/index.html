<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match History</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Ancizar+Sans&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:wght@500&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="app-shell">
    <header class="mobile-top-bar">
      <div class="mobile-header">
        <button id="mobileFiltersBtn" class="mobile-top-bar-btn" type="button" aria-label="Open filters">
          <span class="material-symbols-rounded">filter_list</span>
        </button>
        
        <h1>Match History</h1>
      </div>

      <div class="mobile-actions">
        <button id="mobileTableCompactBtn" class="mobile-top-bar-btn" type="button" aria-pressed="true" aria-label="Disable compact table">
          <span id="mobileTableCompactIcon" class="material-symbols-rounded">arrows_outward</span>
        </button>
        <button id="mobileHistoryBtn" class="mobile-top-bar-btn" type="button" aria-label="Open recent searches">
          <span id="mobileHistoryIcon" class="material-symbols-rounded">history</span>
        </button>
      </div>
    </header>

    <header class="page-header">
      <div>
        <p class="eyebrow">Prototype</p>
        <h1>Match History</h1>
      </div>
    </header>

    <main class="layout">
      <button id="panelBackdrop" class="panel-backdrop" type="button" aria-label="Close filters"></button>
      <section class="panel controls-panel collapsed" id="controlsPanel">
        <div class="controls-header">
          <div class="actions">
            <button id="applyBtn" class="primary-btn">Apply</button>
            <button id="resetBtn" class="secondary-btn">Clear</button>
          </div>
          <button id="settingsToggle" class="panel-side-btn" type="button" aria-expanded="false"
            aria-controls="settingsContent">
            <span id="settingsToggleIcon" class="material-symbols-rounded">filter_list</span>
          </button>
        </div>

        <div id="historyBar" class="controls-header">
          <button id="historyBtn" class="panel-side-btn history-btn" type="button" aria-label="Open recent searches">
            <span class="material-symbols-rounded">history</span>
          </button>
        </div>

        <div id="settingsContent" class="settings-content">

          <div class="settings-grid">
            <div class="setting-card">
              <div id="playerOptions" class="player-options"></div>
            </div>
            <div>
              <div id="columnsContainer" class="columns-grid"></div>
            </div>
          </div>

        </div>
      </section>

      <div id="recentSearchPopup" class="recent-search-popup hidden" role="dialog" aria-modal="true" aria-labelledby="recentSearchTitle">
        <div class="recent-search-popup-card">
          <div class="recent-search-popup-header">
            <h2 id="recentSearchTitle">Recent searches</h2>
            <button id="recentSearchCloseBtn" class="recent-search-close-btn" type="button" aria-label="Close recent searches">
              <span class="material-symbols-rounded">close</span>
            </button>
          </div>
          <div class="recent-search"></div>
        </div>
      </div>

      <section class="panel table-panel">
        <div class="table-panel-scroll table-wrap">
          <table id="resultsTable">
            <thead id="resultsHead"></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>

        <div class="table-panel-footer">
          <div class="table-description">
            <p>Unavailable: Brawl, Mayhem</p>
            <p id="resultsSummary">-</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
