<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match History</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">Prototype</p>
        <h1>Match History</h1>
        <!-- <p class="subtitle">
          Frontend-only prototype for player selection, column selection, and filtering.
        </p> -->
      </div>
    </header>

    <main class="layout">
      <section class="panel controls-panel" id="controlsPanel">
        <button id="settingsToggle" class="panel-collapse-btn" type="button" aria-expanded="true"
          aria-controls="settingsContent">
          <span>Settings</span>
          <span id="settingsToggleIcon" class="panel-collapse-icon">−</span>
        </button>

        <div id="settingsContent" class="settings-content">

          <div class="settings-grid">
            <div>
              <div class="section-header">
                <!--<h3>Actions</h3>-->
              </div>
              <div class="setting-card action-card">
                <div class="actions">
                  <button id="applyBtn" class="primary-btn">Refresh Table</button>
                  <button id="resetBtn" class="secondary-btn" type="button">Reset</button>
                </div>
              </div>
            </div>

            <div>
              <div class="section-header">
                <!--<h3>Players</h3>-->
              </div>
              <div class="setting-card">
                <div id="playerOptions" class="player-options"></div>
              </div>
            </div>

            <div>
              <div class="section-header">
                <!--<h3>Columns & Filters</h3>-->
              </div>

              <div class="setting-card logic-card">
                <label class="label">Filter Logic</label>
                <div class="segmented">
                  <label class="segment">
                    <input type="radio" name="filterMode" value="all" checked />
                    <span>All (AND)</span>
                  </label>
                  <label class="segment">
                    <input type="radio" name="filterMode" value="any" />
                    <span>Any (OR)</span>
                  </label>
                </div>
              </div>

              <div id="columnsContainer" class="columns-grid"></div>
            </div>

          </div>
        </div>
      </section>

      <section class="panel table-panel">
        <div class="panel-header">
          <div>
            <h2>Results</h2>
            <p id="resultsSummary">Showing mock data</p>
          </div>
        </div>

        <div class="table-wrap">
          <table id="resultsTable">
            <thead id="resultsHead"></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
