<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match History</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Ancizar+Sans&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:wght@500&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="app-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">Prototype</p>
        <h1>Match History</h1>
      </div>
    </header>

    <main class="layout">
      <button id="panelBackdrop" class="panel-backdrop" type="button" aria-label="Close filters"></button>
      <section class="panel controls-panel collapsed" id="controlsPanel">
        <div class="controls-header">
          <div class="actions">
            <button id="applyBtn" class="primary-btn">Apply</button>
            <button id="resetBtn" class="secondary-btn">Reset</button>
          </div>
          <button id="settingsToggle" class="panel-collapse-btn" type="button" aria-expanded="false"
            aria-controls="settingsContent">
            <span id="settingsToggleIcon" class="material-symbols-rounded">filter_list</span>
          </button>
        </div>

        <div id="settingsContent" class="settings-content">

          <div class="settings-grid">
            <div class="setting-card">
              <div id="playerOptions" class="player-options"></div>
            </div>
            <div>
              <div id="columnsContainer" class="columns-grid"></div>
            </div>
          </div>

        </div>
      </section>

      <section class="panel table-panel">
        <div class="panel-header results-header">
          <div class="table-description">
            <p id="resultsSummary">Showing mock data</p>
            <p>Unavailable: Brawl, Mayhem</p>
          </div>

          <form id="paginationForm" class="pagination-nav" autocomplete="off">
            <label class="pagination-label" for="pageNumberInput">Page</label>
            <div class="number-input">
              <button type="button" class="number-btn minus">−</button>
              <input id="pageNumberInput" class="pagination-input" type="number" min="1" step="1" value="1"
                inputmode="numeric" />
              <button type="button" class="number-btn plus">+</button>
            </div>
            <span id="paginationTotal" class="pagination-total">of 1</span>
            <button id="pageGoBtn" class="secondary-btn pagination-go-btn" type="submit">Go</button>
          </form>
        </div>

        <div class="table-wrap">
          <table id="resultsTable">
            <thead id="resultsHead"></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
